name: Daily Telegram 28-Day Reset

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 23:00 UTC = 5:00 PM MDT / 4:00 PM MST.
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Telegram message
        run: python send_daily.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROGRAM_START_DATE: ${{ vars.PROGRAM_START_DATE }}

      - name: Save progress state
        run: |
          if [ -f progress_state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git pull --rebase origin main

            git add progress_state.json
            git commit -m "Update Telegram reset progress" || echo "No changes to commit"

            git push origin main
          else
            echo "progress_state.json not found"
          fi
